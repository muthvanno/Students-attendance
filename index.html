<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phnom Srok HS - Attendance 2027</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex h-screen overflow-hidden">
    
    <!-- SIDEBAR -->
    <div class="w-64 bg-blue-800 text-white flex flex-col">
      <div class="p-6 border-b border-blue-700 flex items-center gap-x-3">
        <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center">
          <i class="fa-solid fa-graduation-cap text-blue-800 text-2xl"></i>
        </div>
        <div>
          <h1 class="font-bold text-xl">Phnom Srok HS</h1>
          <p class="text-xs text-blue-200">Attendance 2027</p>
        </div>
      </div>
      <div class="p-4 flex-1">
        <nav class="space-y-1">
          <a href="#" onclick="switchView('students')" class="flex items-center gap-x-3 px-4 py-3 hover:bg-blue-700 rounded-xl font-medium">
            <i class="fa-solid fa-users w-5"></i>
            <span>Student List</span>
          </a>
          <a href="#" onclick="switchView('teachers')" class="flex items-center gap-x-3 px-4 py-3 hover:bg-blue-700 rounded-xl font-medium">
            <i class="fa-solid fa-chalkboard-teacher w-5"></i>
            <span>Teacher Attendance</span>
          </a>
        </nav>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <div class="bg-white border-b px-6 py-4 flex justify-between items-center">
        <div>
          <h2 class="text-2xl font-bold" id="page-title">Student List</h2>
          <p class="text-sm text-gray-500" id="current-date"></p>
        </div>
        <div class="flex items-center gap-x-3">
          <div id="live-clock" class="bg-pink-100 text-pink-700 px-4 py-1.5 rounded-2xl font-mono text-sm font-semibold">00:00:00</div>
          
          <button onclick="importTeachersFromExcel()" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-2xl flex items-center gap-x-2 text-sm">
            <i class="fa-solid fa-file-excel"></i> <span>Import Excel</span>
          </button>

          <button onclick="printCurrentReport()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl flex items-center gap-x-2 text-sm">
            <i class="fa-solid fa-print"></i> <span>Print Report</span>
          </button>
          <button onclick="showAddModal()" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl flex items-center gap-x-2 text-sm">
            <i class="fa-solid fa-plus"></i> <span id="add-button-text">Add Student</span>
          </button>
        </div>
      </div>

      <div class="flex-1 overflow-auto p-6" id="main-content"></div>
    </div>
  </div>

  <!-- SIGNATURE MODAL -->
  <div id="signature-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[60]">
    <div class="bg-white rounded-3xl p-6 w-full max-w-md mx-4">
      <h3 class="text-xl font-bold mb-4 text-center" id="signature-title">ហត្ថលេខា</h3>
      <div class="border-2 border-blue-300 rounded-2xl p-2 bg-white mb-4">
        <canvas id="signature-canvas" width="400" height="180" class="w-full touch-none border border-gray-300 rounded-xl cursor-crosshair"></canvas>
      </div>
      <div class="flex gap-x-3">
        <button onclick="clearSignature()" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl font-medium">Clear</button>
        <button onclick="saveSignature()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium">រក្សាទុក</button>
        <button onclick="closeSignatureModal()" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl font-medium">បោះបង់</button>
      </div>
    </div>
  </div>

  <!-- ADD MODAL -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[70]">
    <div class="bg-white rounded-3xl p-6 w-full max-w-md mx-4">
      <h3 class="text-xl font-bold mb-4" id="add-modal-title">បន្ថែម</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">ឈ្មោះ</label>
          <input type="text" id="new-name" class="w-full border rounded-xl px-4 py-2.5">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">រូបថត</label>
          <input type="file" id="new-photo" accept="image/*" class="w-full border rounded-xl px-4 py-2">
        </div>
      </div>
      <div class="flex gap-x-3 mt-6">
        <button onclick="closeAddModal()" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl font-medium">បោះបង់</button>
        <button onclick="addNewItem()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium">រក្សាទុក</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBwjSme2pm_YRgB4D2B6xQk1DoJJ06GRaM",
      authDomain: "phnom-srok-hs-system-2027.firebaseapp.com",
      projectId: "phnom-srok-hs-system-2027",
      storageBucket: "phnom-srok-hs-system-2027.appspot.com",
      messagingSenderId: "519363325781",
      appId: "1:519363325781:web:04d962253ed22a3c6889dc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentView = 'students';
    let students = [];
    let teachers = [];

    // ==================== GOOGLE DRIVE LINK CONVERTER ====================
    function getDirectImageUrl(url) {
      if (!url) return null;
      
      // If it's a Google Drive link, convert it
      if (url.includes('drive.google.com')) {
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (match && match[1]) {
          return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
      }
      return url; // Return as-is if not Google Drive
    }

    // Real-time listeners
    db.collection("students").onSnapshot(s => {
      students = []; s.forEach(doc => students.push({id: doc.id, ...doc.data()}));
      if (currentView === 'students') renderStudentsTable();
    });

    db.collection("teachers").onSnapshot(s => {
      teachers = []; s.forEach(doc => teachers.push({id: doc.id, ...doc.data()}));
      if (currentView === 'teachers') renderTeachersTable();
    });

    function switchView(view) {
      currentView = view;
      const title = document.getElementById('page-title');
      const addBtn = document.getElementById('add-button-text');

      if (view === 'students') {
        title.innerText = 'Student List';
        addBtn.innerText = 'Add Student';
        renderStudentsTable();
      } else {
        title.innerText = 'Teacher Attendance';
        addBtn.innerText = 'Add Teacher';
        renderTeachersTable();
      }
    }

    function renderStudentsTable() {
      const container = document.getElementById('main-content');
      let html = `<div class="bg-white rounded-3xl shadow border overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-center"><th class="px-3 py-3 bg-blue-700 text-white">ល.រ</th><th class="px-3 py-3 bg-blue-700 text-white">រូបថត</th><th class="px-4 py-3 bg-blue-700 text-white text-left">នាមនិងគោត្តនាម</th><th class="px-3 py-3 bg-blue-700 text-white">ម៉ោងចូល</th><th class="px-3 py-3 bg-blue-700 text-white">ម៉ោងចេញ</th><th class="px-3 py-3 bg-blue-700 text-white no-print">Action</th></tr></thead><tbody class="divide-y">`;

      students.forEach((s, i) => {
        const directPhoto = getDirectImageUrl(s.photo);
        const photo = directPhoto ? `<img src="${directPhoto}" class="w-10 h-10 object-cover mx-auto rounded-lg border">` : 
                      `<div class="w-10 h-10 bg-gray-200 rounded-lg mx-auto flex items-center justify-center border"><i class="fa-solid fa-user text-gray-400"></i></div>`;
        
        html += `<tr><td class="px-3 py-3 text-center">${i+1}</td><td class="px-3 py-3">${photo}</td><td class="px-4 py-3 font-semibold">${s.name}</td><td class="px-3 py-3 text-center"><div class="text-green-600 font-mono">${s.in_time || '-'}</div>${s.in_signature ? `<img src="${s.in_signature}" class="h-6 mx-auto mt-1">` : ''}</td><td class="px-3 py-3 text-center"><div class="text-red-600 font-mono">${s.out_time || '-'}</div>${s.out_signature ? `<img src="${s.out_signature}" class="h-6 mx-auto mt-1">` : ''}</td><td class="px-3 py-3 text-center no-print"><div class="flex gap-x-1 justify-center"><button onclick="showSignatureModal('${s.id}', 'in', 'students')" class="px-2 py-1 text-xs bg-green-100 hover:bg-green-200 text-green-700 rounded">ម៉ោងចូល</button><button onclick="showSignatureModal('${s.id}', 'out', 'students')" class="px-2 py-1 text-xs bg-red-100 hover:bg-red-200 text-red-700 rounded">ម៉ោងចេញ</button></div></td></tr>`;
      });
      html += `</tbody></table></div>`;
      container.innerHTML = html;
    }

    function renderTeachersTable() {
      const container = document.getElementById('main-content');
      let html = `<div class="bg-white rounded-3xl shadow border overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-center"><th class="px-3 py-3 bg-blue-700 text-white">ល.រ</th><th class="px-3 py-3 bg-blue-700 text-white">រូបថត</th><th class="px-4 py-3 bg-blue-700 text-white text-left">គោត្តនាម / ឈ្មោះ</th><th class="px-3 py-3 bg-blue-700 text-white">ម៉ោងចូល</th><th class="px-3 py-3 bg-blue-700 text-white">ម៉ោងចេញ</th><th class="px-3 py-3 bg-blue-700 text-white no-print">Action</th></tr></thead><tbody class="divide-y">`;

      teachers.forEach((t, i) => {
        const directPhoto = getDirectImageUrl(t.photo);
        const photo = directPhoto ? `<img src="${directPhoto}" class="w-10 h-10 object-cover mx-auto rounded-lg border">` : 
                      `<div class="w-10 h-10 bg-gray-200 rounded-lg mx-auto flex items-center justify-center border"><i class="fa-solid fa-user text-gray-400"></i></div>`;
        
        html += `<tr><td class="px-3 py-3 text-center">${i+1}</td><td class="px-3 py-3">${photo}</td><td class="px-4 py-3 font-semibold">${t.name}</td><td class="px-3 py-3 text-center"><div class="text-green-600 font-mono">${t.in_time || '-'}</div>${t.in_signature ? `<img src="${t.in_signature}" class="h-6 mx-auto mt-1">` : ''}</td><td class="px-3 py-3 text-center"><div class="text-red-600 font-mono">${t.out_time || '-'}</div>${t.out_signature ? `<img src="${t.out_signature}" class="h-6 mx-auto mt-1">` : ''}</td><td class="px-3 py-3 text-center no-print"><div class="flex gap-x-1 justify-center"><button onclick="showSignatureModal('${t.id}', 'in', 'teachers')" class="px-2 py-1 text-xs bg-green-100 hover:bg-green-200 text-green-700 rounded">ម៉ោងចូល</button><button onclick="showSignatureModal('${t.id}', 'out', 'teachers')" class="px-2 py-1 text-xs bg-red-100 hover:bg-red-200 text-red-700 rounded">ម៉ោងចេញ</button></div></td></tr>`;
      });
      html += `</tbody></table></div>`;
      container.innerHTML = html;
    }

    // ==================== EXCEL IMPORT ====================
    function importTeachersFromExcel() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.xlsx, .xls';
      input.onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Swal.fire({ title: 'កំពុងនាំចូល...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const reader = new FileReader();
        reader.onload = async function(ev) {
          const data = new Uint8Array(ev.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

          const batch = db.batch();
          let count = 0;

          for (let i = 1; i < jsonData.length; i++) {
            const row = jsonData[i];
            if (!row[1]) continue;

            const teacherRef = db.collection("teachers").doc();
            batch.set(teacherRef, {
              name: row[1] || '',
              gender: row[2] || '',
              dob: row[3] || '',
              position: row[4] || '',
              created_at: new Date()
            });
            count++;
          }

          await batch.commit();
          Swal.fire('ជោគជ័យ', `បាននាំចូលគ្រូ ${count} នាក់`, 'success');
        };
        reader.readAsArrayBuffer(file);
      };
      input.click();
    }

    function showAddModal() {
      document.getElementById('add-modal').classList.remove('hidden');
      document.getElementById('add-modal-title').innerText = currentView === 'students' ? 'បន្ថែមសិស្សថ្មី' : 'បន្ថែមគ្រូថ្មី';
    }

    function closeAddModal() {
      document.getElementById('add-modal').classList.add('hidden');
      document.getElementById('new-name').value = '';
      document.getElementById('new-photo').value = '';
    }

    async function addNewItem() {
      const name = document.getElementById('new-name').value.trim();
      const photoFile = document.getElementById('new-photo').files[0];
      if (!name) return;

      const collection = currentView === 'students' ? db.collection("students") : db.collection("teachers");

      if (photoFile) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          await collection.add({ name, photo: e.target.result, created_at: new Date() });
          closeAddModal();
          Swal.fire('ជោគជ័យ', 'បានបន្ថែម', 'success');
        };
        reader.readAsDataURL(photoFile);
      } else {
        await collection.add({ name, photo: null, created_at: new Date() });
        closeAddModal();
        Swal.fire('ជោគជ័យ', 'បានបន្ថែម', 'success');
      }
    }

    let currentItemId = null;
    let currentSignType = null;
    let currentItemView = null;
    let signatureCanvas, ctx, isDrawing = false;

    function showSignatureModal(id, type, view) {
      currentItemId = id;
      currentSignType = type;
      currentItemView = view;
      document.getElementById('signature-modal').classList.remove('hidden');

      const title = document.getElementById('signature-title');
      title.innerText = type === 'in' ? 'ហត្ថលេខា ម៉ោងចូល' : 'ហត្ថលេខា ម៉ោងចេញ';

      signatureCanvas = document.getElementById('signature-canvas');
      ctx = signatureCanvas.getContext('2d');
      ctx.strokeStyle = '#1e40af';
      ctx.lineWidth = 3;
      ctx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height);

      signatureCanvas.onmousedown = startDrawing;
      signatureCanvas.onmousemove = draw;
      signatureCanvas.onmouseup = stopDrawing;
    }

    function startDrawing(e) { isDrawing = true; const pos = getMousePos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function draw(e) { if (!isDrawing) return; const pos = getMousePos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
    function stopDrawing() { isDrawing = false; }
    function getMousePos(e) {
      const rect = signatureCanvas.getBoundingClientRect();
      return { x: (e.clientX || e.touches[0].clientX) - rect.left, y: (e.clientY || e.touches[0].clientY) - rect.top };
    }
    function clearSignature() { if (ctx) ctx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height); }

    async function saveSignature() {
      if (!currentItemId || !signatureCanvas) return;
      const dataURL = signatureCanvas.toDataURL('image/png');
      const collection = currentItemView === 'students' ? db.collection("students") : db.collection("teachers");
      const now = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const updateData = {};
      if (currentSignType === 'in') { updateData.in_time = now; updateData.in_signature = dataURL; }
      else { updateData.out_time = now; updateData.out_signature = dataURL; }

      await collection.doc(currentItemId).update(updateData);
      closeSignatureModal();
      Swal.fire('ជោគជ័យ', 'ហត្ថលេខា + ម៉ោងត្រូវបានរក្សាទុក', 'success');
    }

    function closeSignatureModal() {
      document.getElementById('signature-modal').classList.add('hidden');
      isDrawing = false;
    }

    function printCurrentReport() {
      const data = currentView === 'students' ? students : teachers;
      const titleText = currentView === 'students' ? 'Student Attendance' : 'Teacher Attendance';

      let html = `<html><head><title>${titleText}</title><style>body{font-family:Arial;padding:20px;}h1,h2{text-align:center;}table{width:100%;border-collapse:collapse;margin-top:20px;}th,td{border:1px solid #000;padding:8px;text-align:center;font-size:12px;}th{background:#f0f0f0;}.signature{max-height:35px;}.photo{width:35px;height:35px;object-fit:cover;border-radius:6px;}</style></head><body>`;
      html += `<h1>វិទ្យាល័យភ្នំស្រុក</h1><h2>${titleText}</h2><p style="text-align:center;">${new Date().toLocaleDateString()}</p><table><thead><tr><th>ល.រ</th><th>រូបថត</th><th>ឈ្មោះ</th><th>ម៉ោងចូល</th><th>ហត្ថលេខា</th><th>ម៉ោងចេញ</th><th>ហត្ថលេខា</th></tr></thead><tbody>`;

      data.forEach((item, i) => {
        const directPhoto = getDirectImageUrl(item.photo);
        const photo = directPhoto ? `<img src="${directPhoto}" class="photo">` : '-';
        const inSig = item.in_signature ? `<img src="${item.in_signature}" class="signature">` : '-';
        const outSig = item.out_signature ? `<img src="${item.out_signature}" class="signature">` : '-';
        html += `<tr><td>${i+1}</td><td>${photo}</td><td>${item.name}</td><td>${item.in_time || '-'}</td><td>${inSig}</td><td>${item.out_time || '-'}</td><td>${outSig}</td></tr>`;
      });

      html += `</tbody></table></body></html>`;
      const printWindow = window.open('', '_blank');
      printWindow.document.write(html);
      printWindow.document.close();
      setTimeout(() => printWindow.print(), 500);
    }

    function updateDate() { document.getElementById('current-date').innerHTML = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); }
    function updateLiveClock() {
      const clock = document.getElementById('live-clock');
      setInterval(() => { clock.innerHTML = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }); }, 1000);
    }

    function init() {
      updateDate();
      updateLiveClock();
      switchView('students');
    }

    window.onload = init;
  </script>
</body>
</html>
