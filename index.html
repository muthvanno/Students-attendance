<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phnom Srok HS - Attendance 2027</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex h-screen overflow-hidden">
    
    <!-- SIDEBAR -->
    <div id="sidebar" class="w-64 bg-blue-800 text-white flex flex-col fixed md:static inset-y-0 left-0 z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
      <div class="p-6 border-b border-blue-700 flex justify-between items-center">
        <div class="flex items-center gap-x-3">
          <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center">
            <i class="fa-solid fa-graduation-cap text-blue-800 text-2xl"></i>
          </div>
          <div>
            <h1 class="font-bold text-xl">Phnom Srok HS</h1>
            <p class="text-xs text-blue-200">Attendance 2027</p>
          </div>
        </div>
        <button onclick="toggleSidebar()" class="md:hidden text-2xl"><i class="fa-solid fa-times"></i></button>
      </div>

      <div class="p-4 flex-1">
        <nav class="space-y-1">
          <!-- Student List -->
          <a href="#" onclick="showSection('students'); toggleSidebar()" 
             class="flex items-center gap-x-3 px-4 py-3 hover:bg-blue-700 rounded-xl font-medium">
            <i class="fa-solid fa-users w-5"></i>
            <span>Student List</span>
          </a>

          <!-- Teacher Attendance -->
          <a href="#" onclick="showSection('teachers'); toggleSidebar()" 
             class="flex items-center gap-x-3 px-4 py-3 hover:bg-blue-700 rounded-xl font-medium">
            <i class="fa-solid fa-chalkboard-teacher w-5"></i>
            <span>Teacher Attendance</span>
          </a>
        </nav>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- HEADER -->
      <div class="bg-white border-b px-4 py-4 flex justify-between items-center no-print">
        <div class="flex items-center gap-x-3">
          <button onclick="toggleSidebar()" class="md:hidden text-2xl"><i class="fa-solid fa-bars"></i></button>
          <div>
            <h2 class="text-2xl font-bold" id="page-title">Student List</h2>
            <p class="text-sm text-gray-500" id="current-date"></p>
          </div>
        </div>
        <div class="flex items-center gap-x-3">
          <div id="live-clock" class="bg-pink-100 text-pink-700 px-4 py-1.5 rounded-2xl font-mono text-sm font-semibold">00:00:00</div>
          <button onclick="printReport()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl flex items-center gap-x-2 text-sm">
            <i class="fa-solid fa-print"></i> <span>Print Report</span>
          </button>
        </div>
      </div>

      <!-- STUDENT SECTION -->
      <div id="student-section">
        <div class="flex-1 overflow-auto p-6">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-2xl font-bold">Student List • Grade 10 • 25 មីនា 2026</h3>
            <button onclick="showAddStudentModal()" class="flex items-center gap-x-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-2xl text-sm no-print">
              <i class="fa-solid fa-plus"></i> <span>Add Student</span>
            </button>
          </div>

          <input type="text" id="search-input" placeholder="ស្វែងរកឈ្មោះសិស្ស..." onkeyup="filterStudents()" class="w-full md:w-96 mb-4 px-4 py-3 border rounded-2xl">

          <div class="bg-white rounded-3xl shadow border overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="text-center">
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ល.រ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">រូបថត</th>
                  <th class="px-4 py-3 border-b bg-blue-700 text-white text-left">នាមនិងគោត្តនាម</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ភេទ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">អាយុ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ម៉ោងចូល</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ម៉ោងចេញ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white no-print">Action</th>
                </tr>
              </thead>
              <tbody id="students-table" class="divide-y"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- TEACHER SECTION -->
      <div id="teacher-section" class="hidden">
        <div class="flex-1 overflow-auto p-6">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-2xl font-bold">Teacher Attendance</h3>
            <button onclick="showAddTeacherModal()" class="flex items-center gap-x-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-2xl text-sm no-print">
              <i class="fa-solid fa-plus"></i> <span>Add Teacher</span>
            </button>
          </div>

          <div class="bg-white rounded-3xl shadow border overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="text-center">
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ល.រ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">រូបថត</th>
                  <th class="px-4 py-3 border-b bg-blue-700 text-white text-left">ឈ្មោះគ្រូ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ម៉ោងចូល</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ម៉ោងចេញ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white no-print">Action</th>
                </tr>
              </thead>
              <tbody id="teachers-table" class="divide-y"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- SIGNATURE MODAL -->
  <div id="signature-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[60]">
    <div class="bg-white rounded-3xl p-6 w-full max-w-md mx-4">
      <h3 class="text-xl font-bold mb-4 text-center" id="signature-title">ហត្ថលេខា</h3>
      <div class="border-2 border-blue-300 rounded-2xl p-2 bg-white mb-4">
        <canvas id="signature-canvas" width="400" height="180" class="w-full touch-none border border-gray-300 rounded-xl cursor-crosshair"></canvas>
      </div>
      <div class="flex gap-x-3">
        <button onclick="clearSignature()" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl font-medium">Clear</button>
        <button onclick="saveSignature()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium">រក្សាទុក</button>
        <button onclick="closeSignatureModal()" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl font-medium">បោះបង់</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== FIREBASE ====================
    const firebaseConfig = {
      apiKey: "AIzaSyBwjSme2pm_YRgB4D2B6xQk1DoJJ06GRaM",
      authDomain: "phnom-srok-hs-system-2027.firebaseapp.com",
      projectId: "phnom-srok-hs-system-2027",
      storageBucket: "phnom-srok-hs-system-2027.appspot.com",
      messagingSenderId: "519363325781",
      appId: "1:519363325781:web:04d962253ed22a3c6889dc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const studentsCollection = db.collection("students");
    const teachersCollection = db.collection("teachers");

    let students = [];
    let teachers = [];

    // ==================== REAL-TIME LISTENERS ====================
    studentsCollection.onSnapshot((snapshot) => {
      students = [];
      snapshot.forEach(doc => students.push({ id: doc.id, ...doc.data() }));
      renderStudentsTable();
    });

    teachersCollection.onSnapshot((snapshot) => {
      teachers = [];
      snapshot.forEach(doc => teachers.push({ id: doc.id, ...doc.data() }));
      renderTeachersTable();
    });

    // ==================== SECTION SWITCH ====================
    function showSection(section) {
      const studentSec = document.getElementById('student-section');
      const teacherSec = document.getElementById('teacher-section');
      const pageTitle = document.getElementById('page-title');

      if (section === 'students') {
        studentSec.classList.remove('hidden');
        teacherSec.classList.add('hidden');
        pageTitle.innerText = 'Student List';
      } else {
        studentSec.classList.add('hidden');
        teacherSec.classList.remove('hidden');
        pageTitle.innerText = 'Teacher Attendance';
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('-translate-x-full');
      if (overlay) overlay.classList.toggle('hidden');
    }

    // ==================== STUDENT FUNCTIONS ====================
    function renderStudentsTable(filtered = null) {
      const tbody = document.getElementById('students-table');
      tbody.innerHTML = '';
      const data = filtered || students;

      data.forEach((student, index) => {
        let photoSrc = student.photoURL || student.photo || null;

        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="px-3 py-3 text-center">${index + 1}</td>
          <td class="px-3 py-3">
            ${photoSrc ? 
              `<img src="${photoSrc}" class="w-10 h-10 object-cover mx-auto rounded-lg border">` : 
              `<div class="w-10 h-10 bg-gray-200 rounded-lg mx-auto flex items-center justify-center border"><i class="fa-solid fa-user text-gray-400"></i></div>`
            }
          </td>
          <td class="px-4 py-3 font-semibold">${student.name}</td>
          <td class="px-3 py-3 text-center">${student.gender}</td>
          <td class="px-3 py-3 text-center">${student.age}</td>
          <td class="px-3 py-3 text-center">
            <div class="text-green-600 font-mono">${student.in_time || '-'}</div>
            ${student.in_signature ? `<img src="${student.in_signature}" class="h-6 mx-auto mt-1">` : ''}
          </td>
          <td class="px-3 py-3 text-center">
            <div class="text-red-600 font-mono">${student.out_time || '-'}</div>
            ${student.out_signature ? `<img src="${student.out_signature}" class="h-6 mx-auto mt-1">` : ''}
          </td>
          <td class="px-3 py-3 text-center no-print">
            <div class="flex gap-x-1 justify-center">
              <button onclick="showSignatureModal('${student.id}', 'in', 'student')" class="px-2 py-1 text-xs bg-green-100 hover:bg-green-200 text-green-700 rounded">ម៉ោងចូល</button>
              <button onclick="showSignatureModal('${student.id}', 'out', 'student')" class="px-2 py-1 text-xs bg-red-100 hover:bg-red-200 text-red-700 rounded">ម៉ោងចេញ</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function filterStudents() {
      const term = document.getElementById('search-input').value.toLowerCase();
      const filtered = students.filter(s => s.name.toLowerCase().includes(term));
      renderStudentsTable(filtered);
    }

    // ==================== TEACHER FUNCTIONS ====================
    function renderTeachersTable() {
      const tbody = document.getElementById('teachers-table');
      tbody.innerHTML = '';
      
      teachers.forEach((teacher, index) => {
        let photoSrc = teacher.photo || null;

        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="px-3 py-3 text-center">${index + 1}</td>
          <td class="px-3 py-3">
            ${photoSrc ? 
              `<img src="${photoSrc}" class="w-10 h-10 object-cover mx-auto rounded-lg border">` : 
              `<div class="w-10 h-10 bg-gray-200 rounded-lg mx-auto flex items-center justify-center border"><i class="fa-solid fa-user text-gray-400"></i></div>`
            }
          </td>
          <td class="px-4 py-3 font-semibold">${teacher.name}</td>
          <td class="px-3 py-3 text-center">
            <div class="text-green-600 font-mono">${teacher.in_time || '-'}</div>
            ${teacher.in_signature ? `<img src="${teacher.in_signature}" class="h-6 mx-auto mt-1">` : ''}
          </td>
          <td class="px-3 py-3 text-center">
            <div class="text-red-600 font-mono">${teacher.out_time || '-'}</div>
            ${teacher.out_signature ? `<img src="${teacher.out_signature}" class="h-6 mx-auto mt-1">` : ''}
          </td>
          <td class="px-3 py-3 text-center no-print">
            <div class="flex gap-x-1 justify-center">
              <button onclick="showSignatureModal('${teacher.id}', 'in', 'teacher')" class="px-2 py-1 text-xs bg-green-100 hover:bg-green-200 text-green-700 rounded">ម៉ោងចូល</button>
              <button onclick="showSignatureModal('${teacher.id}', 'out', 'teacher')" class="px-2 py-1 text-xs bg-red-100 hover:bg-red-200 text-red-700 rounded">ម៉ោងចេញ</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function showAddTeacherModal() {
      Swal.fire({
        title: 'បន្ថែមគ្រូថ្មី',
        html: `
          <input id="teacher-name" class="swal2-input" placeholder="ឈ្មោះគ្រូ">
          <input type="file" id="teacher-photo" class="swal2-file mt-3">
        `,
        confirmButtonText: 'រក្សាទុក',
        preConfirm: () => {
          const name = document.getElementById('teacher-name').value;
          if (!name) {
            Swal.showValidationMessage('សូមបញ្ចូលឈ្មោះគ្រូ');
          }
          return { name };
        }
      }).then((result) => {
        if (result.isConfirmed) {
          teachersCollection.add({
            name: result.value.name,
            photo: null,
            created_at: new Date()
          });
          Swal.fire('ជោគជ័យ', 'គ្រូត្រូវបានបន្ថែម', 'success');
        }
      });
    }

    // ==================== SIGNATURE SYSTEM ====================
    let currentSigningId = null;
    let currentSignType = null;
    let currentType = null; // 'student' or 'teacher'
    let signatureCanvas, ctx, isDrawing = false;

    function showSignatureModal(id, type, collectionType) {
      currentSigningId = id;
      currentSignType = type;
      currentType = collectionType;
      document.getElementById('signature-modal').classList.remove('hidden');

      const title = document.getElementById('signature-title');
      title.innerText = type === 'in' ? 'ហត្ថលេខា ម៉ោងចូល' : 'ហត្ថលេខា ម៉ោងចេញ';

      signatureCanvas = document.getElementById('signature-canvas');
      ctx = signatureCanvas.getContext('2d');
      ctx.strokeStyle = '#1e40af';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height);

      signatureCanvas.onmousedown = startDrawing;
      signatureCanvas.onmousemove = draw;
      signatureCanvas.onmouseup = stopDrawing;
      signatureCanvas.onmouseout = stopDrawing;
      signatureCanvas.ontouchstart = startDrawing;
      signatureCanvas.ontouchmove = draw;
      signatureCanvas.ontouchend = stopDrawing;
    }

    function getMousePos(e) {
      const rect = signatureCanvas.getBoundingClientRect();
      return { x: (e.clientX || e.touches[0].clientX) - rect.left, y: (e.clientY || e.touches[0].clientY) - rect.top };
    }

    function startDrawing(e) { isDrawing = true; const pos = getMousePos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function draw(e) { if (!isDrawing) return; const pos = getMousePos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
    function stopDrawing() { isDrawing = false; }
    function clearSignature() { if (ctx) ctx.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height); }

    async function saveSignature() {
      if (!currentSigningId || !signatureCanvas || !currentSignType) return;

      const dataURL = signatureCanvas.toDataURL('image/png');
      const collection = currentType === 'student' ? studentsCollection : teachersCollection;
      const now = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const updateData = {};
      if (currentSignType === 'in') {
        updateData.in_time = now;
        updateData.in_signature = dataURL;
      } else {
        updateData.out_time = now;
        updateData.out_signature = dataURL;
      }

      await collection.doc(currentSigningId).update(updateData);
      Swal.fire('ជោគជ័យ', 'ហត្ថលេខា + ម៉ោងត្រូវបានរក្សាទុក', 'success');
      closeSignatureModal();
    }

    function closeSignatureModal() {
      document.getElementById('signature-modal').classList.add('hidden');
      currentSigningId = null;
      currentSignType = null;
      currentType = null;
      isDrawing = false;
    }

    function init() {
      document.getElementById('current-date').innerHTML = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      
      setInterval(() => {
        document.getElementById('live-clock').innerHTML = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      }, 1000);
    }

    window.onload = init;
  </script>
</body>
</html>
