<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phnom Srok HS - Attendance 2027</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
  <div class="flex h-screen overflow-hidden">
    
    <!-- SIDEBAR -->
    <div id="sidebar" class="w-64 bg-blue-800 text-white flex flex-col fixed md:static inset-y-0 left-0 z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
      <div class="p-6 border-b border-blue-700 flex justify-between items-center">
        <div class="flex items-center gap-x-3">
          <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center">
            <i class="fa-solid fa-graduation-cap text-blue-800 text-2xl"></i>
          </div>
          <div>
            <h1 class="font-bold text-xl">Phnom Srok HS</h1>
            <p class="text-xs text-blue-200">Attendance 2027</p>
          </div>
        </div>
        <button onclick="toggleSidebar()" class="md:hidden text-2xl"><i class="fa-solid fa-times"></i></button>
      </div>
      <div class="p-4 flex-1">
        <nav class="space-y-1">
          <a href="#" onclick="toggleSidebar()" class="flex items-center gap-x-3 px-4 py-3 hover:bg-blue-700 rounded-xl font-medium">
            <i class="fa-solid fa-users w-5"></i>
            <span>Student List</span>
          </a>
        </nav>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <div class="bg-white border-b px-4 py-4 flex justify-between items-center no-print">
        <div class="flex items-center gap-x-3">
          <button onclick="toggleSidebar()" class="md:hidden text-2xl"><i class="fa-solid fa-bars"></i></button>
          <div>
            <h2 class="text-2xl font-bold">Student List</h2>
            <p class="text-sm text-gray-500" id="current-date"></p>
          </div>
        </div>
        <div class="flex items-center gap-x-3">
          <div id="live-clock" class="bg-pink-100 text-pink-700 px-4 py-1.5 rounded-2xl font-mono text-sm font-semibold">00:00:00</div>
          <button onclick="printReport()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl flex items-center gap-x-2 text-sm">
            <i class="fa-solid fa-print"></i> <span>Print Report</span>
          </button>
        </div>
      </div>

      <div class="flex-1 overflow-auto p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-2xl font-bold">Student List • Grade 10 • 25 មីនា 2026</h3>
          <button onclick="showAddStudentModal()" class="flex items-center gap-x-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-2xl text-sm no-print">
            <i class="fa-solid fa-plus"></i> <span>Add Student</span>
          </button>
        </div>

        <input type="text" id="search-input" placeholder="ស្វែងរកឈ្មោះសិស្ស..." onkeyup="filterStudents()" class="w-full md:w-96 mb-4 px-4 py-3 border rounded-2xl">

        <div id="print-area">
          <div class="bg-white rounded-3xl shadow border overflow-x-auto">
            <table class="w-full text-sm">
              <thead>
                <tr class="text-center">
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ល.រ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">រូបថត</th>
                  <th class="px-4 py-3 border-b bg-blue-700 text-white text-left">នាមនិងគោត្តនាម</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ភេទ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">អាយុ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ម៉ោងចូល</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white">ម៉ោងចេញ</th>
                  <th class="px-3 py-3 border-b bg-blue-700 text-white no-print">Action</th>
                </tr>
              </thead>
              <tbody id="students-table" class="divide-y"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD STUDENT MODAL -->
  <div id="add-student-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[70]">
    <div class="bg-white rounded-3xl p-6 w-full max-w-md mx-4">
      <h3 class="text-xl font-bold mb-4">បន្ថែមសិស្សថ្មី</h3>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">ឈ្មោះសិស្ស</label>
          <input type="text" id="new-name" class="w-full border rounded-xl px-4 py-2.5">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">ភេទ</label>
            <select id="new-gender" class="w-full border rounded-xl px-4 py-2.5">
              <option value="Male">ប្រុស</option>
              <option value="Female">ស្រី</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">អាយុ</label>
            <input type="number" id="new-age" class="w-full border rounded-xl px-4 py-2.5">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">រូបថតសិស្ស (ជ្រើសរើស)</label>
          <input type="file" id="new-photo" accept="image/*" class="w-full border rounded-xl px-4 py-2">
        </div>
      </div>

      <div class="flex gap-x-3 mt-6">
        <button onclick="closeAddStudentModal()" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl font-medium">បោះបង់</button>
        <button onclick="addNewStudent()" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium">រក្សាទុក</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
      apiKey: "AIzaSyBwjSme2pm_YRgB4D2B6xQk1DoJJ06GRaM",
      authDomain: "phnom-srok-hs-system-2027.firebaseapp.com",
      projectId: "phnom-srok-hs-system-2027",
      storageBucket: "phnom-srok-hs-system-2027.appspot.com",
      messagingSenderId: "519363325781",
      appId: "1:519363325781:web:04d962253ed22a3c6889dc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const studentsCollection = db.collection("students");

    let students = [];

    studentsCollection.onSnapshot((snapshot) => {
      students = [];
      snapshot.forEach(doc => {
        students.push({ id: doc.id, ...doc.data() });
      });
      renderStudentsTable();
    });

    function renderStudentsTable(filtered = null) {
      const tbody = document.getElementById('students-table');
      tbody.innerHTML = '';
      const data = filtered || students;

      data.forEach((student, index) => {
        // Support both photoURL and photo (Base64)
        let photoSrc = student.photoURL || student.photo || null;

        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="px-3 py-3 text-center">${index + 1}</td>
          <td class="px-3 py-3">
            ${photoSrc ? 
              `<img src="${photoSrc}" class="w-10 h-10 rounded-full object-cover mx-auto">` : 
              `<div class="w-10 h-10 bg-gray-200 rounded-full mx-auto flex items-center justify-center"><i class="fa-solid fa-user text-gray-400"></i></div>`
            }
          </td>
          <td class="px-4 py-3 font-semibold">${student.name}</td>
          <td class="px-3 py-3 text-center">${student.gender}</td>
          <td class="px-3 py-3 text-center">${student.age}</td>
          <td class="px-3 py-3 text-center">
            <div class="text-green-600 font-mono">${student.in_time || '-'}</div>
          </td>
          <td class="px-3 py-3 text-center">
            <div class="text-red-600 font-mono">${student.out_time || '-'}</div>
          </td>
          <td class="px-3 py-3 text-center no-print">
            <div class="flex gap-x-1 justify-center">
              <button onclick="showSignatureModal('${student.id}', 'in')" class="px-2 py-1 text-xs bg-green-100 hover:bg-green-200 text-green-700 rounded">ម៉ោងចូល</button>
              <button onclick="showSignatureModal('${student.id}', 'out')" class="px-2 py-1 text-xs bg-red-100 hover:bg-red-200 text-red-700 rounded">ម៉ោងចេញ</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function filterStudents() {
      const term = document.getElementById('search-input').value.toLowerCase();
      const filtered = students.filter(s => s.name.toLowerCase().includes(term));
      renderStudentsTable(filtered);
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    function showAddStudentModal() {
      document.getElementById('add-student-modal').classList.remove('hidden');
    }

    function closeAddStudentModal() {
      document.getElementById('add-student-modal').classList.add('hidden');
      document.getElementById('new-name').value = '';
      document.getElementById('new-age').value = '';
      document.getElementById('new-photo').value = '';
    }

    function addNewStudent() {
      const name = document.getElementById('new-name').value.trim();
      const gender = document.getElementById('new-gender').value;
      const age = document.getElementById('new-age').value;
      const photoFile = document.getElementById('new-photo').files[0];

      if (!name) {
        Swal.fire('Error', 'សូមបញ្ចូលឈ្មោះសិស្ស', 'error');
        return;
      }

      if (photoFile) {
        const reader = new FileReader();
        reader.onload = function(e) {
          studentsCollection.add({
            name: name,
            gender: gender,
            age: parseInt(age) || 0,
            photo: e.target.result, // Base64
            created_at: new Date()
          });
          closeAddStudentModal();
          Swal.fire('ជោគជ័យ', 'សិស្សត្រូវបានបន្ថែម', 'success');
        };
        reader.readAsDataURL(photoFile);
      } else {
        studentsCollection.add({
          name: name,
          gender: gender,
          age: parseInt(age) || 0,
          photo: null,
          created_at: new Date()
        });
        closeAddStudentModal();
        Swal.fire('ជោគជ័យ', 'សិស្សត្រូវបានបន្ថែម', 'success');
      }
    }

    function init() {
      // ready
    }

    window.onload = init;
  </script>
</body>
</html>
